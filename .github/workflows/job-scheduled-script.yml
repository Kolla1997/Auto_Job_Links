name: Run Dice Job Links Script

on:
  schedule:
    - cron: '27 * * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run script
        run: python DiceLinks.py

      - name: Commit and push Excel file if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add dice_jobs_list.xlsx
          git diff --staged --quiet || git commit -m "Auto-update: dice_jobs_list.xlsx - $(date +'%Y-%m-%d %H:%M:%S UTC')"
          git push
