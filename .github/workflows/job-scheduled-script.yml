name: Auto Update Dice Jobs Excel

on:
  schedule:
    - cron: "*/27 * * * *"

  workflow_dispatch:

concurrency:
  group: auto-job-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-excel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # CREATE credentials.json
      - name: Create credentials.json
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json

      # CREATE token.json
      - name: Create token.json
        run: |
          echo '${{ secrets.GOOGLE_TOKEN }}' > token.json

      - name: Run Python Script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python DiceLinks.py

      - name: Commit and Push Changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

          git add dice_jobs_list.xlsx

          git commit -m "Auto-update: dice_jobs_list.xlsx - $(date -u +"%Y-%m-%d %H:%M:%S UTC")" || echo "No changes to commit"

          git pull --rebase origin main

          git push origin main
